version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: qa_analytics_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qa_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: